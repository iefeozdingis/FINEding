name: CI Failure Auto Issue

on:
  workflow_run:
    workflows: ["CI", "Python Tests"]
    types:
      - completed

jobs:
  create-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Create Issue
        uses: actions/github-script@v7
        with:
          script: |
            const wf = context.payload.workflow_run;
            const title = "CI Failed: " + wf.name + " - " + wf.head_branch;
            const sha = wf.head_sha.substring(0, 7);
            const body = "## CI Run Failed\n\n"
              + "| Detail | Value |\n"
              + "|--------|-------|\n"
              + "| **Workflow** | " + wf.name + " |\n"
              + "| **Branch** | `" + wf.head_branch + "` |\n"
              + "| **Commit** | `" + sha + "` |\n"
              + "| **Run** | [View](" + wf.html_url + ") |\n"
              + "\nCI pipeline failed. Please check the run details.";

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: ["ci-failure"],
            });

            const dup = issues.data.find(function(i) {
              return i.title.includes(wf.name) && i.title.includes(wf.head_branch);
            });

            if (dup) {
              console.log("Duplicate issue: #" + dup.number);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ["ci-failure", "bug"],
            });

            console.log("Issue created.");
